services:
  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    command: taskiq worker --log-level=INFO src.utils.tasks:broker
    volumes:
      - ./generated:/app/generated
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - redis

  scheduler:
    build: .
    command: taskiq scheduler --log-level=INFO src.utils.tasks:broker
    volumes:
      - ./generated:/app/generated
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - redis

  api:
    build: .
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./generated:/app/generated
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - redis
