services:
  rabbitmq:
    image: rabbitmq:3-management
    env_file:
      - .env
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    command: [
      "redis-server",
      "--requirepass", "${REDIS_PASSWORD}"
    ]
    env_file:
      - .env
    ports:
      - "6379:6379"

  worker:
    build: .
    command: taskiq worker --log-level=INFO src.utils.tasks:broker
    volumes:
      - ./generated:/app/generated
    env_file:
      - .env
    depends_on:
      - rabbitmq
      - redis
